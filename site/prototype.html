<html lang="en">

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#f9f7ff">
<meta name="description" content="Interactive design reference for LibreOffice Material — a hand-built HTML mockup of the target Material Design 3 suite. Not a screenshot of a compiled build.">
<link rel="canonical" href="https://codingmachineedge.github.io/libreoffice-material/prototype.html">
<title>LibreOffice Material — interactive design reference</title>
<style>
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--desk,#e7e0ec);font-family:"Segoe UI Variable Text","Segoe UI",system-ui,-apple-system,BlinkMacSystemFont,Roboto,sans-serif;color:#1d1b20}
  button{font-family:inherit}
  a{color:var(--p)}
  .mono{font-family:"Cascadia Code","SFMono-Regular",Consolas,"Roboto Mono",monospace}
  .ic{display:inline-flex;align-items:center;justify-content:center;line-height:0;flex:0 0 auto}
  .ic svg{width:1em;height:1em;display:block}
  .lo-scroll::-webkit-scrollbar{width:12px;height:12px}
  .lo-scroll::-webkit-scrollbar-thumb{background:var(--outline);border-radius:8px;border:3px solid transparent;background-clip:padding-box}
  .lo-scroll::-webkit-scrollbar-track{background:transparent}
  @keyframes lo-pop{from{opacity:0;transform:translateY(-4px) scale(.98)}to{opacity:1;transform:none}}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:120;display:none;align-items:center;gap:12px;padding:13px 20px;border-radius:8px;background:var(--inv-s);color:var(--on-inv-s);box-shadow:0 10px 30px rgba(0,0,0,.4);font:500 13px/1 inherit}
  #toast.show{display:flex;animation:lo-pop .16s ease}
  a.skip{position:fixed;left:8px;top:8px;z-index:200;padding:10px 14px;border-radius:8px;background:#5d3fc0;color:#fff;transform:translateY(-160%);transition:transform .15s}
  a.skip:focus{transform:none}
  :focus-visible{outline:3px solid var(--p);outline-offset:2px}
  @media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important}}
  @media (forced-colors: active){[data-hov],button{border:1px solid ButtonText}}
</style>
</head>

/* =========================================================================
   Fully-featured regex builder — attached to every search bar in the suite.
   Each search bar has independent state in S.rx[id] = {q, flags, regex, open,
   caret}. In literal mode q is a case-insensitive substring; in regex mode q is
   a JavaScript RegExp with i/g/m/s flags. The builder inserts tokens at the
   caret, toggles flags, validates live, and reports a match count.
   ========================================================================= */
var RX_FLAGS = [['i','Ignore case'],['g','Global'],['m','Multiline (^ $ per line)'],['s','Dotall (. matches newline)']];
// token groups: [label, tooltip, insert, caretBack] — caretBack lands the caret inside brackets/groups
var RX_TOKENS = [
  { g:'Anchors', t:[['^','Start of line','^',0],['$','End of line','$',0],['\\b','Word boundary','\\b',0],['\\B','Non-boundary','\\B',0]] },
  { g:'Classes', t:[['.','Any character','.',0],['\\d','Digit','\\d',0],['\\D','Non-digit','\\D',0],['\\w','Word char','\\w',0],['\\W','Non-word','\\W',0],['\\s','Whitespace','\\s',0],['\\S','Non-space','\\S',0],['[ ]','Character set','[]',1],['[^ ]','Negated set','[^]',1],['a-z','Range','[a-z]',1]] },
  { g:'Quantifiers', t:[['*','0 or more','*',0],['+','1 or more','+',0],['?','Optional','?',0],['{n}','Exactly n','{}',1],['{n,}','n or more','{,}',2],['{n,m}','Between','{,}',2],['*?','Lazy','*?',0]] },
  { g:'Groups', t:[['( )','Capture group','()',1],['(?: )','Non-capturing','(?:)',1],['|','Alternation','|',0],['(?= )','Lookahead','(?=)',1],['(?! )','Negative lookahead','(?!)',1]] },
  { g:'Escapes', t:[['\\.','Literal dot','\\.',0],['\\/','Slash','\\/',0],['\\(','Paren','\\(',0],['\\t','Tab','\\t',0],['\\n','Newline','\\n',0]] }
];
function compileRx(st){
  if(st.q===''){ return {ok:true, empty:true, test:function(){return true;}}; }
  if(!st.regex){ var q=st.q.toLowerCase(); return {ok:true, test:function(s){ return String(s).toLowerCase().indexOf(q)>=0; }}; }
  try{
    var fl=(st.flags||'').replace(/[^gimsuy]/g,'').replace('g',''); // g is stateful for .test(); strip it
    var re=new RegExp(st.q, fl);
    return {ok:true, re:re, test:function(s){ return re.test(String(s)); }};
  }catch(e){ return {ok:false, error:e.message, test:function(){return false;}}; }
}
function rxPredicate(id){ return compileRx(S.rx[id]); }

function renderSearch(id, placeholder, total, matched, wrapStyle){
  var st=S.rx[id], pred=compileRx(st);
  var invalid = st.regex && st.q!=='' && !pred.ok;
  var border = invalid ? '2px solid var(--err-base)' : 'var(--bw) solid var(--outline-v)';
  var mono = st.regex ? ";font-family:'Cascadia Code',Consolas,monospace" : '';
  var clearBtn = st.q ? '<button title="Clear" data-act="rxclear:'+id+'" data-hov="background:var(--outline-v)" style="width:28px;height:28px;border:none;background:transparent;border-radius:var(--r-sm);color:var(--on-sv);cursor:pointer;display:grid;place-items:center;flex:0 0 auto">'+ic('close',16)+'</button>' : '';
  var modeBtn = '<button title="Regular-expression mode" aria-pressed="'+st.regex+'" data-act="rxmode:'+id+'" style="height:28px;padding:0 9px;border:'+(st.regex?'none':'var(--bw) solid var(--outline)')+';background:'+(st.regex?'var(--p)':'transparent')+';color:'+(st.regex?'var(--on-p)':'var(--on-sv)')+';border-radius:var(--r-sm);cursor:pointer;font:700 12px/1 monospace;flex:0 0 auto">.*</button>';
  var buildBtn = '<button title="Regex builder" aria-expanded="'+st.open+'" data-act="rxtoggle:'+id+'" data-hov="background:var(--pc);color:var(--on-pc)" style="width:30px;height:30px;border:none;background:'+(st.open?'var(--pc)':'transparent')+';color:'+(st.open?'var(--on-pc)':'var(--on-sv)')+';border-radius:var(--r-sm);cursor:pointer;display:grid;place-items:center;flex:0 0 auto">'+ic('tune',20)+'</button>';
  var row = '<div style="height:44px;display:flex;align-items:center;gap:8px;padding:0 8px 0 14px;border-radius:var(--r-pill);background:var(--sc);border:'+border+'">'
    + ic('search',20,'var(--on-sv)')
    + '<input id="rxin-'+id+'" value="'+esc(st.q)+'" aria-label="'+esc(placeholder)+'" placeholder="'+esc(placeholder)+'" spellcheck="false" autocomplete="off" autocapitalize="off" style="flex:1;min-width:0;border:none;background:transparent;outline:none;color:var(--on-s);font:400 14px/1 inherit'+mono+'">'
    + clearBtn + modeBtn + buildBtn
    + '</div>';
  var pop = st.open ? rxBuilder(id, pred, total, matched) : '';
  return '<div data-silent="1" style="position:relative;'+(wrapStyle||'flex:1')+'">'+row+pop+'</div>';
}
function rxBuilder(id, pred, total, matched){
  var st=S.rx[id];
  var flagsHtml='';
  for(var i=0;i<RX_FLAGS.length;i++){ var f=RX_FLAGS[i][0], on=st.flags.indexOf(f)>=0;
    flagsHtml+='<button title="'+esc(RX_FLAGS[i][1])+'" data-act="rxflag:'+id+':'+f+'" aria-pressed="'+on+'" style="width:30px;height:30px;border:'+(on?'none':'var(--bw) solid var(--outline)')+';background:'+(on?'var(--p)':'transparent')+';color:'+(on?'var(--on-p)':'var(--on-s)')+';border-radius:var(--r-sm);cursor:pointer;font:700 13px/1 monospace">'+f+'</button>'; }
  var tokHtml='';
  for(var g=0;g<RX_TOKENS.length;g++){ var grp=RX_TOKENS[g];
    tokHtml+='<div style="margin-top:10px"><div style="font:700 10px/1 inherit;letter-spacing:.07em;text-transform:uppercase;color:var(--on-sv);margin-bottom:6px">'+esc(grp.g)+'</div><div style="display:flex;flex-wrap:wrap;gap:5px">';
    for(var t=0;t<grp.t.length;t++){ var tk=grp.t[t];
      tokHtml+='<button title="'+esc(tk[1])+'" data-act="rxtok:'+id+':'+g+':'+t+'" data-hov="background:var(--pc);color:var(--on-pc);border-color:var(--p)" class="mono" style="height:28px;padding:0 9px;border:var(--bw) solid var(--outline-v);background:var(--surface);color:var(--on-s);border-radius:var(--r-sm);cursor:pointer;font-size:12px">'+esc(tk[0])+'</button>'; }
    tokHtml+='</div></div>';
  }
  var status;
  if(st.q==='') status='<span style="color:var(--on-sv)">Type or build a pattern — '+total+' items</span>';
  else if(st.regex && !pred.ok) status='<span style="color:var(--err-base);font-weight:600">Invalid pattern: '+esc(pred.error)+'</span>';
  else status='<span style="color:var(--p);font-weight:700">'+matched+'</span><span style="color:var(--on-sv)"> of '+total+' match'+(st.regex?' &nbsp;/'+esc(st.q)+'/'+esc((st.flags||'').replace(/[^gimsuy]/g,'')):'')+'</span>';
  var preview = st.q!=='' ? esc(st.q) : '<span style="color:var(--on-sv)">(empty)</span>';
  return '<div class="lo-scroll" style="position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:70;max-height:340px;overflow:auto;background:var(--surface);border:var(--bw) solid var(--outline-v);border-radius:var(--r-cont);box-shadow:0 16px 40px rgba(0,0,0,.28);padding:14px;animation:lo-pop .12s ease">'
    + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font:600 13px/1 inherit;color:var(--on-s)">Regex builder</span><span style="font:400 11px/1 inherit;color:var(--on-sv)">insert tokens · toggle flags · live matches</span><button title="Close" data-act="rxclose:'+id+'" data-hov="background:var(--outline-v)" style="margin-left:auto;width:28px;height:28px;border:none;background:transparent;border-radius:var(--r-sm);color:var(--on-sv);cursor:pointer;display:grid;place-items:center">'+ic('close',16)+'</button></div>'
    + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span class="mono" style="color:var(--on-sv)">/</span><div class="mono" style="flex:1;min-width:0;height:34px;display:flex;align-items:center;padding:0 10px;border:var(--bw) solid var(--outline);border-radius:var(--r-sm);color:var(--on-s);overflow:hidden;white-space:nowrap;font-size:13px">'+preview+'</div><span class="mono" style="color:var(--on-sv)">/</span><div style="display:flex;gap:4px">'+flagsHtml+'</div></div>'
    + tokHtml
    + '<div style="display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:10px;border-top:var(--bw) solid var(--outline-v);font:400 12px/1.3 inherit">'+status+'<button data-act="rxclear:'+id+'" data-hov="background:var(--pc)" style="margin-left:auto;flex:0 0 auto;height:30px;padding:0 12px;border:var(--bw) solid var(--outline);background:transparent;color:var(--p);border-radius:var(--r-pill);cursor:pointer;font:600 12px/1 inherit">Clear</button></div>'

}

    + '<div style="position:relative"><div style="height:48px;display:flex;align-items:center;padding:0 14px;border:var(--bw) solid var(--outline);border-radius:var(--r-cont);color:var(--on-s);font:400 14px/1 inherit;background:var(--surface)">HP LaserJet Pro M404<span style="margin-left:auto">'+ic('expand_more',20,'var(--on-sv)')+'</span></div>'+fieldLabel('Printer','var(--on-sv)','var(--sc)')+'</div>'
    + '<div style="position:relative;width:120px"><div style="height:48px;display:flex;align-items:center;padding:0 14px;border:2px solid var(--p);border-radius:var(--r-cont);color:var(--on-s);font:400 14px/1 inherit;background:var(--surface)">1</div>'+fieldLabel('Copies','var(--p)','var(--sc)')+'</div>'
    + '<div><div style="font:500 13px/1 inherit;color:var(--on-s);margin-bottom:10px">Range</div><div style="display:flex;flex-direction:column;gap:10px">'+rHtml+'</div></div>'
    + '</div>';
  var body='<div style="display:flex;gap:20px;padding:4px 20px 20px">'+preview+controls+'</div>';
  var footer=dlgFooter('<div style="flex:1"></div>'+outBtn('Cancel')+fillBtn('Print'));
  return dlgWrap(720, dlgHead('Print')+body+footer);
}
function findReplaceDialog(){
  var st=S;
  var matchedRuns=DOC_RUNS.filter(frTest).length;
  var re=frCompile(true), occ=0; if(re){ DOC_RUNS.forEach(function(r){ var mm=r.match(re); if(mm) occ+=mm.length; }); }
  var findField = renderSearch('find','Find', DOC_RUNS.length, matchedRuns, 'width:100%');
  var matchCase = st.rx.find.flags.indexOf('i')<0;
  function opt(label, checked, act){
    return '<label data-act="'+act+'" style="display:flex;align-items:center;gap:8px;cursor:pointer"><span style="display:grid;place-items:center;width:18px;height:18px;border-radius:var(--r-check);flex:0 0 auto;background:'+(checked?'var(--p)':'transparent')+';border:2px solid '+(checked?'var(--p)':'var(--on-sv)')+'">'+(checked?ic('check',14,'var(--on-p)'):'')+'</span><span style="font:400 13px/1 inherit;color:var(--on-s)">'+label+'</span></label>';
  }
  var options = '<div style="display:flex;flex-wrap:wrap;gap:14px 22px;margin:14px 0 6px">'
    + opt('Match case', matchCase, 'rxflag:find:i')
    + opt('Whole words only', st.frWholeWord, 'toggle:frWholeWord')
    + opt('Regular expressions', st.rx.find.regex, 'rxmode:find')
    + '</div>';
  var replaceField = '<div style="position:relative;margin-top:14px"><input id="fr-replace" value="'+esc(st.frReplace)+'" aria-label="Replace with" placeholder="Replace with…" autocomplete="off" style="width:100%;height:44px;padding:0 14px;border:var(--bw) solid var(--outline);border-radius:var(--r-cont);background:var(--surface);color:var(--on-s);font:400 14px/1 inherit;outline:none"><span style="position:absolute;top:-8px;left:12px;padding:0 4px;background:var(--sc);color:var(--on-sv);font:500 12px/1 inherit">Replace</span></div>';
  var runsHtml='';
  for(var i=0;i<DOC_RUNS.length;i++){ var hit=frTest(DOC_RUNS[i]);
    runsHtml+='<div style="padding:8px 10px;border-radius:var(--r-sm);margin-bottom:4px;font:400 13px/1.6 inherit;color:var(--on-s);background:'+(hit?'color-mix(in srgb,var(--pc) 55%,transparent)':'transparent')+';border-left:3px solid '+(hit?'var(--p)':'transparent')+'">'+frHighlight(DOC_RUNS[i])+'</div>'; }
  var summary = st.rx.find.q==='' ? 'Enter a search term or build a pattern.'
    : (occ+' match'+(occ===1?'':'es')+' in '+matchedRuns+' of '+DOC_RUNS.length+' paragraphs');
  var body = '<div style="padding:6px 20px 18px">'
    + '<div style="font:400 12px/1.4 inherit;color:var(--on-sv);margin-bottom:6px">Search the document — the same full regex builder is one click away (the <strong>.*</strong> toggle mirrors the “Regular expressions” option below).</div>'
    + findField
    + options
    + replaceField
    + '<div style="display:flex;align-items:center;gap:10px;margin:16px 0 8px"><span style="font:600 12px/1 inherit;color:var(--on-s)">Document</span><span style="font:600 12px/1 inherit;color:var(--p)">'+esc(summary)+'</span></div>'
    + '<div class="lo-scroll" style="max-height:150px;overflow:auto;border:var(--bw) solid var(--outline-v);border-radius:var(--r-cont);padding:8px;background:var(--scl)">'+runsHtml+'</div>'
    + '</div>';
  var footer = '<div style="display:flex;align-items:center;gap:8px;padding:14px 20px;border-top:var(--bw) solid var(--outline-v)">'
    + outBtn('Find All') + outBtn('Find Next')
    + '<div style="flex:1"></div>'
    + outBtn('Replace')
    + '<button data-act="frreplaceall" data-hov="background:var(--pa-hover)" style="height:40px;padding:0 22px;border:none;border-radius:var(--r-pill);background:var(--p);color:var(--on-p);font:600 14px/1 inherit;cursor:pointer">Replace All</button>'
    + '</div>';
  // overflow:visible so the regex-builder popover can escape the dialog box
  return '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(680px,94%);background:var(--sc);border:var(--bw) solid var(--outline-v);border-radius:16px;box-shadow:0 24px 64px rgba(0,0,0,.4);overflow:visible;animation:lo-pop .16s ease">'
    + dlgHead('Find &amp; Replace') + body + footer + '</div>';
}

/* ---- status bar ---- */
function statusBar(){
  var STATUS={
    writer:['Page 1 of 3','842 words, 5,120 characters','English (USA)','Default Paragraph Style'],
    calc:['Sheet 1 of 3','Average: 1,926;  Sum: 15,410','English (USA)'],
    impress:['Slide '+S.slide+' of 8','Default','English (USA)'],
    draw:['Page 1 of 1','0 objects selected'],
    base:['Table: Customers','24 records'],
    math:['Formula','Elements docked']
  };
  var left=STATUS[S.screen]||[], lHtml='';
  for(var i=0;i<left.length;i++){ lHtml+='<span style="font:400 12px/1 inherit;color:var(--on-sv)">'+esc(left[i])+'</span>'; }
  return '<div style="display:flex;align-items:center;gap:16px;height:28px;padding:0 14px;background:var(--sc);border-top:var(--bw) solid var(--outline-v)">'+lHtml+'<div style="flex:1"></div><span style="font:400 12px/1 inherit;color:var(--on-sv)">100%</span><div style="width:120px;height:4px;border-radius:2px;background:var(--outline-v);position:relative"><div style="position:absolute;left:0;top:0;bottom:0;width:50%;background:var(--p);border-radius:2px"></div><div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:var(--p)"></div></div></div>';
}

/* ---- footer note + click-away ---- */
function footerNote(){
  return '<div style="text-align:center;color:var(--on-sv);font:400 12px/1.5 inherit;padding:6px 20px 0;max-width:900px">Interactive design reference — color, shape, type and metrics resolve from <span class="mono">vcl/uiconfig/theme_definitions/material/definition.xml</span>. Switch theme, density and chrome above; navigate the suite with the Surface control. This is a hand-built HTML mockup, not a screenshot of a compiled LibreOffice.</div>';
}
function menuAway(){
  if(!S.menuOpen) return '';
  return '<div data-act="closemenus" style="position:fixed;inset:0;z-index:20"></div>';
}

/* ===== events ===== */
var app=document.getElementById('app');

app.addEventListener('click', function(e){
  var el=e.target.closest('[data-act]');
  if(!el) return;
  var act=el.getAttribute('data-act');
  var ci=act.indexOf(':');
  var cmd = ci<0 ? act : act.slice(0,ci);
  var arg = ci<0 ? '' : act.slice(ci+1);
  switch(cmd){
    case 'nav': set('screen',arg); break;
    case 'set': { var p=arg.indexOf(':'); var key=arg.slice(0,p); var val=decodeURIComponent(arg.slice(p+1));
      if(key==='sheet'||key==='slide'||key==='layout'||key==='baseSel'||key==='gTab'||key==='histSel'){ val=parseInt(val,10); }
      set(key,val); break; }
    case 'toast': toast(decodeURIComponent(arg)); break;
    case 'menu': { var l=decodeURIComponent(arg); S.menuOpen = S.menuOpen===l ? null : l; render(); break; }
    case 'menuitem': { var lbl=decodeURIComponent(arg); S.menuOpen=null;
      if(/Find & Replace/.test(lbl)){ S.screen='dialogs'; S.dialog='find'; }
      render(); toast(lbl); break; }
    case 'closemenus': S.menuOpen=null; render(); break;
    case 'toggle': S[arg]=!S[arg]; render(); break;
    case 'fmt': S.fmt[arg]=!S.fmt[arg]; render(); break;
    case 'align': S.fmt.align=arg; render(); break;
    case 'chip': S.gChip[arg]=!S.gChip[arg]; render(); break;
    case 'slider': S.gSlider = S.gSlider>=90 ? 20 : S.gSlider+15; render(); break;
    case 'feat': set('featSel', decodeURIComponent(arg)); break;
    case 'rxtoggle': S.rx[arg].open=!S.rx[arg].open; render(); break;
    case 'rxclose': S.rx[arg].open=false; render(); break;
    case 'rxmode': S.rx[arg].regex=!S.rx[arg].regex; S._focusRx=arg; render(); break;
    case 'rxclear': S.rx[arg].q=''; S.rx[arg].caret=0; S._focusRx=arg; render(); break;
    case 'rxflag': { var pf=arg.indexOf(':'); var fid=arg.slice(0,pf), fl=arg.slice(pf+1);
      var cur=S.rx[fid].flags; S.rx[fid].flags = cur.indexOf(fl)>=0 ? cur.split(fl).join('') : (cur+fl);
      render(); break; }
    case 'rxtok': { var tp=arg.split(':'); var tid=tp[0], gi=+tp[1], ti=+tp[2];
      var tk=RX_TOKENS[gi].t[ti], rs=S.rx[tid]; var cc=(rs.caret==null?rs.q.length:rs.caret);
      rs.q = rs.q.slice(0,cc)+tk[2]+rs.q.slice(cc); rs.caret = cc + tk[2].length - (tk[3]||0);
      rs.regex=true; S._focusRx=tid; render(); break; }
    case 'frreplaceall': { var fre=frCompile(true), n=0; if(fre){ DOC_RUNS.forEach(function(r){ var mm=r.match(fre); if(mm) n+=mm.length; }); }
      toast(n ? ('Replaced '+n+' occurrence'+(n===1?'':'s')+(S.frReplace ? (' with “'+S.frReplace+'”') : '')) : 'No matches to replace'); break; }
  }
});

/* global toast-on-click (matches the design's behavior; skips silent zones) */
app.addEventListener('click', function(e){
  var b=e.target.closest('button');
  if(!b || b.disabled || b.closest('[data-silent]')) return;
  var act=b.getAttribute('data-act')||'';
  // items that already produce their own toast / are pure navigation are skipped
  if(/^(toast:|menuitem:|feat:|menu:|set:featCat|frreplaceall)/.test(act)) return;
  var label=(b.getAttribute('title')||b.textContent||'').trim();
  if(label) toast(label);
}, true);

/* regex search inputs (live filter; preserves focus + caret across re-render) */
app.addEventListener('input', function(e){
  var t=e.target; if(!t || !t.id) return;
  if(t.id==='fr-replace'){ S.frReplace=t.value; return; } // no re-render: keep native caret/focus
  if(t.id.indexOf('rxin-')!==0) return;
  var id=t.id.slice(5); if(!S.rx[id]) return;
  S.rx[id].q=t.value; S.rx[id].caret=t.selectionStart; S._focusRx=id; render();
});

/* hover system (mirrors the design's style-hover attribute) */
app.addEventListener('mouseover', function(e){
  var el=e.target.closest('[data-hov]'); if(!el) return;
  if(el.dataset.base===undefined) el.dataset.base=el.getAttribute('style')||'';
  el.setAttribute('style', el.dataset.base+';'+el.getAttribute('data-hov'));
});
app.addEventListener('mouseout', function(e){
  var el=e.target.closest('[data-hov]'); if(!el) return;
  if(el.dataset.base!==undefined) el.setAttribute('style', el.dataset.base);
});

/* load the full command catalog (same-origin); fall back to the embedded subset */
try{
  fetch('prototype-features.json').then(function(r){ return r.ok?r.json():null; }).then(function(d){
    if(Array.isArray(d)&&d.length){ S.features=d;
      var ae=document.activeElement; if(ae&&ae.id&&ae.id.indexOf('rxin-')===0){ S._focusRx=ae.id.slice(5); }
      if(S.screen==='code'||S.screen==='gallery') render(); }
  }).catch(function(){});
}catch(_){}

render();
</script>
