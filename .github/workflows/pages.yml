name: Deploy project site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "docs/evidence/runs/**"
      - "docs/SCREENSHOTS.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Stage canonical verified captures
        shell: bash
        run: |
          set -euo pipefail
          run_id='20260720-012853-577059e274-vs2026-msi-raster'
          source_dir="docs/evidence/runs/$run_id/screenshots"
          publish_dir="site/evidence/$run_id"
          mkdir -p "$publish_dir"
          cp "$source_dir/start-center-light.png" "$publish_dir/"
          cp "$source_dir/start-center-templates-light.png" "$publish_dir/"

      - name: Upload static site
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
