name: Deploy project site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "docs/evidence/runs/**"
      - "docs/SCREENSHOTS.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Stage canonical verified captures
        shell: bash
        run: |
          set -euo pipefail
          stage_run() {
            local run_id="$1"
            shift
            local source_dir="docs/evidence/runs/$run_id/screenshots"
            local publish_dir="site/evidence/$run_id"
            mkdir -p "$publish_dir"
            for image in "$@"; do
              cp "$source_dir/$image" "$publish_dir/"
            done
          }
          stage_run \
            '20260720-143309-393263ad92-windows-headless-light' \
            'start-center-light.png' \
            'start-center-light-keyboard-focus.png' \
            'start-center-templates-light.png'
          stage_run \
            '20260720-140327-7029dccf40-windows-headless-dark' \
            'start-center-dark.png' \
            'start-center-dark-keyboard-focus.png' \
            'start-center-templates-dark.png'
          stage_run \
            '20260720-033338-fbba560e27-windows-headless-highcontrast' \
            'start-center-highcontrast.png' \
            'start-center-highcontrast-keyboard-focus.png' \
            'start-center-templates-highcontrast.png'

      - name: Upload static site
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
