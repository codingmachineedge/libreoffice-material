name: Validate Material UI source

on:
  push:
    branches:
      - main
    paths:
      - "bin/check-material-theme.py"
      - "bin/check-startcenter-no-donate.py"
      - "bin/test_material_theme_validator.py"
      - "bin/test_startcenter_no_donate.py"
      - "include/tools/XmlWalker.hxx"
      - "include/vcl/builder.hxx"
      - "include/vcl/builderbase.hxx"
      - "include/vcl/settings.hxx"
      - "include/vcl/widgetbuilder.hxx"
      - "sfx2/inc/bitmaps.hlst"
      - "sfx2/uiconfig/ui/startcenter.ui"
      - "sfx2/source/dialog/backingwindow.cxx"
      - "sfx2/source/dialog/backingwindow.hxx"
      - "tools/source/xml/XmlWalker.cxx"
      - "tools/qa/data/test.xml"
      - "tools/qa/cppunit/test_xmlwalker.cxx"
      - "vcl/inc/widgetdraw/**"
      - "vcl/source/app/settings.cxx"
      - "vcl/source/gdi/FileDefinitionWidgetDraw.cxx"
      - "vcl/source/gdi/WidgetDefinition*.cxx"
      - "vcl/source/outdev/nativecontrols.cxx"
      - "vcl/source/window/builder.cxx"
      - "vcl/qa/cppunit/data/suggestedaction.ui"
      - "vcl/qa/cppunit/treeviewtest.cxx"
      - "vcl/qa/cppunit/widgetdraw/**"
      - "vcl/uiconfig/theme_definitions/material/**"
      - ".github/workflows/material-source.yml"
  pull_request:
    paths:
      - "bin/check-material-theme.py"
      - "bin/check-startcenter-no-donate.py"
      - "bin/test_material_theme_validator.py"
      - "bin/test_startcenter_no_donate.py"
      - "include/tools/XmlWalker.hxx"
      - "include/vcl/builder.hxx"
      - "include/vcl/builderbase.hxx"
      - "include/vcl/settings.hxx"
      - "include/vcl/widgetbuilder.hxx"
      - "sfx2/inc/bitmaps.hlst"
      - "sfx2/uiconfig/ui/startcenter.ui"
      - "sfx2/source/dialog/backingwindow.cxx"
      - "sfx2/source/dialog/backingwindow.hxx"
      - "tools/source/xml/XmlWalker.cxx"
      - "tools/qa/data/test.xml"
      - "tools/qa/cppunit/test_xmlwalker.cxx"
      - "vcl/inc/widgetdraw/**"
      - "vcl/source/app/settings.cxx"
      - "vcl/source/gdi/FileDefinitionWidgetDraw.cxx"
      - "vcl/source/gdi/WidgetDefinition*.cxx"
      - "vcl/source/outdev/nativecontrols.cxx"
      - "vcl/source/window/builder.cxx"
      - "vcl/qa/cppunit/data/suggestedaction.ui"
      - "vcl/qa/cppunit/treeviewtest.cxx"
      - "vcl/qa/cppunit/widgetdraw/**"
      - "vcl/uiconfig/theme_definitions/material/**"
      - ".github/workflows/material-source.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate semantic Material theme
        run: python3 bin/check-material-theme.py

      - name: Test Material theme validator
        run: python3 -m unittest bin/test_material_theme_validator.py

      - name: Lint Start Center UI
        run: python3 bin/lint-ui.py sfx2/uiconfig/ui/startcenter.ui

      - name: Validate Start Center actions
        run: python3 bin/check-startcenter-no-donate.py

      - name: Test Start Center action validator
        run: python3 -m unittest bin/test_startcenter_no_donate.py
