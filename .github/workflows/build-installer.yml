# Validate focused native LibreOffice sources on Linux.
#
# Windows MSI publication is owned exclusively by windows-installer.yml. This
# workflow deliberately creates no tag or release, so a Linux validation run
# can never replace the stable Windows Latest release or publish a prerelease.

name: Validate Linux native sources

on:
  push:
    branches: [main]
    paths-ignore:
      - "site/**"
      - "docs/**"
      - "**/*.md"
      - "bin/validate-prototype.mjs"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running the native source validation?"
        required: false
        default: "manual native source validation"

permissions:
  contents: read

concurrency:
  group: linux-native-source-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-tests:
    name: Linux focused native C++ tests
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      CCACHE_DIR: /home/runner/.ccache
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          sudo docker image prune -a -f || true
          sudo apt-get clean || true
          df -h /

      - name: Install build dependencies
        run: |
          test -f /etc/apt/sources.list.d/ubuntu.sources
          sudo sed -Ei \
            's/^Types:[[:space:]]*deb$/Types: deb deb-src/' \
            /etc/apt/sources.list.d/ubuntu.sources
          grep -Eq '^Types:.*deb-src' /etc/apt/sources.list.d/ubuntu.sources
          sudo apt-get update
          sudo apt-get build-dep -y libreoffice
          sudo apt-get install -y --no-install-recommends \
            ccache libarchive-zip-perl nasm unzip xsltproc zip

      - name: Validate build prerequisites
        run: |
          for tool in \
            gcc g++ make gawk autoconf pkg-config bison flex gperf nasm \
            ccache perl python3 zip unzip xsltproc; do
            command -v "$tool"
          done
          perl -MArchive::Zip -e 1
          python3 -c 'import sys; assert sys.version_info >= (3, 11)'
          test "$(gcc -dumpfullversion | cut -d. -f1)" -ge 13

      - name: Configure ccache
        run: ccache --max-size=5G

      - name: Restore ccache
        uses: actions/cache/restore@v6
        with:
          path: ~/.ccache
          key: lo-ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            lo-ccache-${{ runner.os }}-

      - name: Restore external source tarballs
        uses: actions/cache/restore@v6
        with:
          path: external/tarballs
          key: linux-external-tarballs-${{ hashFiles('download.lst') }}

      - name: Configure lean native test build
        run: |
          ./autogen.sh \
            --enable-online-update \
            --with-privacy-policy-url=https://github.com/codingmachineedge/libreoffice-material/blob/main/PRIVACY.md \
            --without-java \
            --without-dotnet \
            --without-help \
            --without-helppack-integration \
            --without-myspell-dicts \
            --without-doxygen \
            --disable-odk \
            --disable-pdfium \
            --disable-database-connectivity

      - name: Run required native C++ tests serially
        run: |
          set -euo pipefail
          for target in \
            CppunitTest_tools_test \
            CppunitTest_extensions_test_update \
            CppunitTest_vcl_widget_definition_reader_test \
            CppunitTest_vcl_file_definition_widget_draw_test
          do
            make -j"$(nproc)" "$target"
          done

      - name: Save external source tarballs
        if: always()
        uses: actions/cache/save@v6
        with:
          path: external/tarballs
          key: linux-external-tarballs-${{ hashFiles('download.lst') }}

      - name: Preserve native test diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: native-test-diagnostics-${{ github.run_id }}
          path: |
            config.log
            autogen.input
            config_host.mk
            external/tarballs/fetch.log
            workdir/CppunitTest/*.test.log
            workdir/CppunitTest/*.core
          if-no-files-found: ignore
          retention-days: 14

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: ~/.ccache
          key: lo-ccache-${{ runner.os }}-${{ github.sha }}
