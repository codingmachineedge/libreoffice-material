# Build a genuine Windows x64 MSI from this source tree.
#
# This job deliberately keeps the unofficial LibreOfficeDev product identity,
# validates the Windows payload without installing it into the runner, and
# publishes only after a real MSI has been produced and opened successfully.

name: Build Windows MSI

on:
  workflow_dispatch:
    inputs:
      jobs:
        description: "Parallel native build jobs"
        required: true
        default: "3"
        type: choice
        options:
          - "2"
          - "3"
          - "4"
      reason:
        description: "Why are you running the Windows build?"
        required: false
        default: "manual Windows installer build"

permissions:
  contents: write

concurrency:
  group: windows-msi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-msi:
    name: Windows x64 tests + build + MSI
    runs-on: windows-2022
    timeout-minutes: 355
    env:
      LO_BUILD_ROOT: C:\lo
      LO_BUILD_DIR: C:\lo\build
      LO_TARBALL_DIR: C:\lo\tarballs
      BUILD_JOBS: ${{ inputs.jobs }}
      # Serialize concurrent MSVC writes to shared compiler PDBs in bundled
      # Visual Studio projects such as cppunit.
      CL: /FS

    steps:
      - name: Force an LF checkout
        shell: pwsh
        run: git config --global core.autocrlf false

      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Confirm checkout and reclaim build disk
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $eol = git ls-files --eol autogen.sh configure.ac distro-configs/LibreOfficeWin64.conf
          $eol | Write-Host
          if ($eol -match 'w/crlf') {
            throw 'The Windows build requires an LF checkout; CRLF files were detected.'
          }

          Get-PSDrive -PSProvider FileSystem | Format-Table Name, Used, Free, Root
          $reclaim = @(
            'C:\Android',
            'C:\Program Files\dotnet',
            'C:\hostedtoolcache\windows\CodeQL',
            'C:\vcpkg'
          )
          foreach ($path in $reclaim) {
            if (Test-Path -LiteralPath $path) {
              Write-Host "Removing unused runner payload: $path"
              try {
                Remove-Item -LiteralPath $path -Recurse -Force -ErrorAction Stop
              }
              catch {
                Write-Warning "Could not fully remove ${path}: $($_.Exception.Message)"
              }
            }
          }

          New-Item -ItemType Directory -Force -Path $env:LO_BUILD_DIR, $env:LO_TARBALL_DIR | Out-Null
          $free = (Get-PSDrive -Name C).Free
          Write-Host ("C: free after cleanup: {0:N1} GiB" -f ($free / 1GB))
          if ($free -lt 30GB) {
            throw 'Fewer than 30 GiB remain on C:; refusing to start a build that cannot package reliably.'
          }

      - name: Validate Visual Studio and Windows SDK packaging tools
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path -LiteralPath $vswhere)) {
            throw 'vswhere.exe is missing.'
          }

          $vs = & $vswhere -latest -version '[17.0,18.0)' -products '*' -requires `
            Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            Microsoft.VisualStudio.Component.VC.ATL `
            Microsoft.VisualStudio.Component.VC.Redist.MSM `
            Microsoft.VisualStudio.Component.VC.CMake.Project `
            -property installationPath
          if (-not $vs) {
            throw 'Visual Studio 2022 with MSVC x64, ATL, CMake, and CRT merge modules was not found.'
          }
          Write-Host "Visual Studio: $vs"

          $cmake = Join-Path $vs 'Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin\cmake.exe'
          if (-not (Test-Path -LiteralPath $cmake)) {
            throw "Visual Studio CMake is missing: $cmake"
          }
          $atl = Get-ChildItem -Path (Join-Path $vs 'VC\Tools\MSVC') -Recurse -Filter atlbase.h -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $atl) {
            throw 'ATL headers are missing.'
          }
          $msmRoot = Join-Path $vs 'VC\Redist\MSVC'
          $msmX86 = Get-ChildItem -Path $msmRoot -Recurse -Filter Microsoft_VC143_CRT_x86.msm -ErrorAction SilentlyContinue | Select-Object -First 1
          $msmX64 = Get-ChildItem -Path $msmRoot -Recurse -Filter Microsoft_VC143_CRT_x64.msm -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $msmX86 -or -not $msmX64) {
            throw 'Both the x86 and x64 Visual C++ v143 CRT merge modules are required.'
          }

          $kitsRoot = (Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots').KitsRoot10
          if (-not $kitsRoot) {
            throw 'Windows 10/11 SDK root is not registered.'
          }
          $sdk = Get-ChildItem -LiteralPath (Join-Path $kitsRoot 'bin') -Directory |
            Where-Object { $_.Name -match '^10\.0\.\d+\.0$' } |
            Sort-Object { [version]$_.Name } -Descending |
            Where-Object {
              $version = $_.Name
              $required = @(
                (Join-Path $kitsRoot "Include\$version\um\adoint.h"),
                (Join-Path $kitsRoot "Include\$version\um\SqlUcode.h"),
                (Join-Path $kitsRoot "Include\$version\um\usp10.h"),
                (Join-Path $kitsRoot "Lib\$version\um\x64\user32.lib"),
                (Join-Path $kitsRoot "bin\$version\x64\midl.exe"),
                (Join-Path $kitsRoot "bin\$version\x86\MsiInfo.exe"),
                (Join-Path $kitsRoot "bin\$version\x86\MsiDb.exe"),
                (Join-Path $kitsRoot "bin\$version\x86\MsiTran.exe"),
                (Join-Path $kitsRoot "bin\$version\x86\uuidgen.exe")
              )
              -not ($required | Where-Object { -not (Test-Path -LiteralPath $_) })
            } |
            Select-Object -First 1
          if (-not $sdk) {
            throw 'No complete Windows SDK with desktop headers, libraries, MIDL, and MSI tools was found.'
          }

          Write-Host "Windows SDK: $($sdk.Name)"
          Write-Host "ATL: $($atl.FullName)"
          Write-Host "x86 CRT merge module: $($msmX86.FullName)"
          Write-Host "x64 CRT merge module: $($msmX64.FullName)"
          & $cmake --version

          # --without-dotnet disables the modern net_ure feature, but the
          # legacy CLI bridge required by the MSI still needs .NET Framework
          # tools. Match configure.ac's 32-bit registry lookups so runner-image
          # drift fails before the long Cygwin configure/build sequence.
          $registry32 = [Microsoft.Win32.RegistryKey]::OpenBaseKey(
            [Microsoft.Win32.RegistryHive]::LocalMachine,
            [Microsoft.Win32.RegistryView]::Registry32
          )
          try {
            function Get-Registry32Value([string]$subKey, [string]$name) {
              $key = $registry32.OpenSubKey($subKey)
              if (-not $key) {
                return $null
              }
              try {
                return [string]$key.GetValue($name)
              }
              finally {
                $key.Dispose()
              }
            }

            $cscRoot = Get-Registry32Value `
              'SOFTWARE\Microsoft\NET Framework Setup\NDP\v4\Client' 'InstallPath'
            $csc = if ($cscRoot) { Join-Path $cscRoot 'csc.exe' } else { $null }
            if (-not $csc -or -not (Test-Path -LiteralPath $csc)) {
              throw 'The legacy CLI bridge requires .NET Framework csc.exe from the 32-bit registry view.'
            }

            $legacyNetFxVersions = @('4.8.1', '4.8', '4.7.2', '4.7.1', '4.7', '4.6.2', '4.6.1', '4.6')
            $al = $null
            $mscoree = $null
            foreach ($version in $legacyNetFxVersions) {
              $baseKey = "SOFTWARE\Microsoft\Microsoft SDKs\NETFXSDK\$version"
              $toolRoot = Get-Registry32Value "$baseKey\WinSDK-NetFx40Tools" 'InstallationFolder'
              $alCandidates = @()
              if ($toolRoot) {
                $alCandidates += Join-Path $toolRoot 'al.exe'
                $alCandidates += Join-Path $toolRoot 'bin\al.exe'
              }
              foreach ($candidate in $alCandidates) {
                if (-not $al -and $candidate -and (Test-Path -LiteralPath $candidate)) {
                  $al = $candidate
                }
              }

              $kitsRoot = Get-Registry32Value $baseKey 'KitsInstallationFolder'
              $candidateMscoree = if ($kitsRoot) { Join-Path $kitsRoot 'Lib\um\x64\mscoree.lib' } else { $null }
              if (-not $mscoree -and $candidateMscoree -and (Test-Path -LiteralPath $candidateMscoree)) {
                $mscoree = $candidateMscoree
              }
            }

            if (-not $al -or -not $mscoree) {
              throw 'The legacy CLI bridge requires .NET Framework al.exe and x64 mscoree.lib from the 32-bit registry view.'
            }
            Write-Host "Legacy CLI csc.exe: $csc"
            Write-Host "Legacy CLI al.exe: $al"
            Write-Host "Legacy CLI mscoree.lib: $mscoree"
          }
          finally {
            $registry32.Dispose()
          }

      - name: Restore external source tarballs
        id: external-cache
        uses: actions/cache/restore@v6
        with:
          path: C:\lo\tarballs
          key: windows-external-tarballs-${{ hashFiles('download.lst') }}

      - name: Install Cygwin build prerequisites
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $setup = 'C:\cygwin-setup.exe'
          curl.exe -fL --retry 5 --retry-delay 5 https://cygwin.com/setup-x86_64.exe -o $setup
          if ($LASTEXITCODE -ne 0) {
            throw 'Downloading the official Cygwin installer failed.'
          }
          $signature = Get-AuthenticodeSignature -LiteralPath $setup
          Write-Host "Cygwin setup signature: $($signature.Status) / $($signature.SignerCertificate.Subject)"
          if ($signature.Status -ne 'Valid') {
            throw 'The Cygwin installer signature is not valid.'
          }

          $packages = @(
            'autoconf', 'automake', 'bison', 'cabextract', 'diffutils', 'file',
            'flex', 'gawk', 'gettext-devel', 'git', 'gperf', 'libxml2-devel',
            'libxslt', 'make', 'nasm', 'patch', 'perl', 'perl-Archive-Zip',
            'perl-Font-TTF', 'perl-IO-String', 'pkg-config', 'python3', 'rsync',
            'unzip', 'wget', 'which', 'zip'
          ) -join ','
          $setupArguments = @(
            '-q', '-n', '-N', '-d',
            '-R', 'C:\cygwin64',
            '-s', 'https://mirrors.kernel.org/sourceware/cygwin/',
            '-P', $packages
          )
          $setupProcess = Start-Process -FilePath $setup -ArgumentList $setupArguments `
            -WindowStyle Hidden -Wait -PassThru
          if ($setupProcess.ExitCode -ne 0) {
            throw "Cygwin setup failed with exit code $($setupProcess.ExitCode)."
          }

          $toolDir = 'C:\cygwin64\opt\lo\bin'
          New-Item -ItemType Directory -Force -Path $toolDir | Out-Null
          $downloads = @{
            'make.exe' = 'https://dev-www.libreoffice.org/bin/cygwin/make-4.2.1-msvc.exe'
            'pkgconf-2.4.3.exe' = 'https://dev-www.libreoffice.org/extern/pkgconf-2.4.3.exe'
          }
          foreach ($entry in $downloads.GetEnumerator()) {
            $destination = Join-Path $toolDir $entry.Key
            curl.exe -fL --retry 5 --retry-delay 5 $entry.Value -o $destination
            if ($LASTEXITCODE -ne 0 -or (Get-Item -LiteralPath $destination).Length -lt 10000) {
              throw "Downloading $($entry.Key) failed."
            }
            $hash = (Get-FileHash -LiteralPath $destination -Algorithm SHA256).Hash
            Write-Host "$($entry.Key) SHA-256 $hash"
          }
          $cygwinBash = 'C:\cygwin64\bin\bash.exe'
          $uniqueShell = 'C:\cygwin64\bin\cygbash.exe'
          if (-not (Test-Path -LiteralPath $cygwinBash)) {
            throw 'Cygwin bash was not installed.'
          }
          Copy-Item -LiteralPath $cygwinBash -Destination $uniqueShell -Force
          'C:\cygwin64\bin' | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Validate Cygwin and LibreOffice build tools
        shell: cygbash --noprofile --norc -o igncr -eo pipefail {0}
        run: |
          test "$(uname -o)" = Cygwin
          export PATH="/opt/lo/bin:/usr/local/bin:/usr/bin:/bin:$PATH"
          for tool in autoconf automake bison flex gawk gperf nasm ninja patch perl python3 rsync unzip wget zip; do
            command -v "$tool"
          done
          perl -MArchive::Zip -e 1
          perl -MFont::TTF::Font -e 1
          /opt/lo/bin/make.exe --version | tee /tmp/make-version.txt
          grep -q 'Built for Windows' /tmp/make-version.txt
          /opt/lo/bin/pkgconf-2.4.3.exe --version
          test "$(command -v nasm)" = /usr/bin/nasm
          nasm_version="$(nasm -v | awk '{ print $3 }')"
          printf 'NASM %s\n' "$nasm_version"
          test "$(printf '%s\n' 2.16 "$nasm_version" | sort -V | head -n 1)" = 2.16

      - name: Configure Windows x64 LibreOfficeDev build
        shell: cygbash --noprofile --norc -o igncr -eo pipefail {0}
        env:
          SOURCE_CHECKOUT: ${{ github.workspace }}
        run: |
          export PATH="/opt/lo/bin:/usr/local/bin:/usr/bin:/bin:$PATH"
          src_dir="$(cygpath -u "$SOURCE_CHECKOUT")"
          build_dir="$(cygpath -u "$LO_BUILD_DIR")"
          tarball_dir="$(cygpath -u "$LO_TARBALL_DIR")"
          # actions/checkout registers the Win32 spelling for Git for Windows;
          # Cygwin Git needs the equivalent POSIX spelling as its own safe path.
          test -n "$HOME"
          mkdir -p "$HOME"
          /usr/bin/git config --global --add safe.directory "$src_dir"
          /usr/bin/git -C "$src_dir" rev-parse --verify HEAD
          mkdir -p "$build_dir" "$tarball_dir"
          cd "$build_dir"
          "$src_dir/autogen.sh" \
            --host=x86_64-pc-cygwin \
            --with-visual-studio=2022 \
            --with-windows-sdk=10.0 \
            --with-package-format=msi \
            --with-external-tar=C:/lo/tarballs \
            --with-lang=en-US \
            --enable-online-update \
            --with-privacy-policy-url=https://github.com/codingmachineedge/libreoffice-material/blob/main/PRIVACY.md \
            --enable-python=fully-internal \
            --without-java \
            --without-junit \
            --without-dotnet \
            --without-help \
            --without-helppack-integration \
            --without-myspell-dicts \
            --without-doxygen \
            --without-fonts \
            --with-galleries=no \
            --disable-odk \
            --disable-ccache \
            --disable-pdfium \
            --enable-database-connectivity \
            --disable-cairo-canvas

          # svxcore always compiles desktop form objects that import dbtools
          # symbols. The database-connectivity switch is documented upstream
          # as work in progress; disabling it omits dbtools from svxcore's
          # link dependencies and fails the full Windows build. Keep the
          # supported desktop feature explicit and fail before the long native
          # targets if configure ever drops it.
          grep -Eq '^export BUILD_TYPE=.*[[:space:]]DBCONNECTIVITY([[:space:]]|$)' config_host.mk
          # Windows MSI manifests include the legacy CLI bridge payload. Modern
          # .NET remains disabled above; it is a separate build feature.
          grep -qx 'export ENABLE_CLI=TRUE' config_host.mk

      - name: Link critical Windows desktop library
        shell: cygbash --noprofile --norc -o igncr -eo pipefail {0}
        run: |
          export PATH="/opt/lo/bin:/usr/local/bin:/usr/bin:/bin:$PATH"
          cd "$(cygpath -u "$LO_BUILD_DIR")"
          # This library contains the desktop form objects whose supported
          # dependency graph requires dbtools. Build it before the longer test
          # sequence so a future feature-configuration regression fails fast;
          # all outputs are reused by the tests and final product build.
          /opt/lo/bin/make.exe -j"$BUILD_JOBS" Library_svxcore

      - name: Run required native C++ regression tests
        shell: cygbash --noprofile --norc -o igncr -eo pipefail {0}
        run: |
          export PATH="/opt/lo/bin:/usr/local/bin:/usr/bin:/bin:$PATH"
          cd "$(cygpath -u "$LO_BUILD_DIR")"
          # Each top-level convenience target starts its own nested gbuild.
          # Run them serially so those nested builds cannot unpack, patch, or
          # compile the same external dependency concurrently. Each target's
          # internal dependency graph still uses BUILD_JOBS in parallel.
          for target in \
            CppunitTest_tools_test \
            CppunitTest_extensions_test_update \
            CppunitTest_vcl_widget_definition_reader_test \
            CppunitTest_vcl_file_definition_widget_draw_test \
            CppunitTest_vcl_treeview
          do
            /opt/lo/bin/make.exe -j"$BUILD_JOBS" "$target"
          done

      - name: Build required legacy CLI installer payload
        shell: cygbash --noprofile --norc -o igncr -eo pipefail {0}
        run: |
          export PATH="/opt/lo/bin:/usr/local/bin:/usr/bin:/bin:$PATH"
          cd "$(cygpath -u "$LO_BUILD_DIR")"
          for target in cli_ure unoil
          do
            /opt/lo/bin/make.exe -j"$BUILD_JOBS" "$target"
          done
          for file in \
            cli_basetypes.dll cli_ure.dll cli_uretypes.dll cli_cppuhelper.dll cli_oootypes.dll \
            policy.1.0.cli_basetypes.dll policy.1.0.cli_ure.dll \
            policy.1.0.cli_uretypes.dll policy.1.0.cli_cppuhelper.dll \
            policy.1.0.cli_oootypes.dll \
            cli_basetypes.config cli_ure.config cli_uretypes.config \
            cli_cppuhelper.config cli_oootypes.config
          do
            test -s "instdir/program/$file"
          done

      - name: Build LibreOfficeDev and emit Windows installation set
        shell: cygbash --noprofile --norc -o igncr -eo pipefail {0}
        run: |
          export PATH="/opt/lo/bin:/usr/local/bin:/usr/bin:/bin:$PATH"
          cd "$(cygpath -u "$LO_BUILD_DIR")"
          /opt/lo/bin/make.exe -j"$BUILD_JOBS" build

      - name: Save external source tarballs
        if: always() && steps.external-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: C:\lo\tarballs
          key: windows-external-tarballs-${{ hashFiles('download.lst') }}

      - name: Confirm, stage, and structurally validate emitted MSI artifacts
        id: stage
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $installation = Join-Path $env:LO_BUILD_DIR 'workdir\installation'
          # LibreOffice retains intermediate MSI databases under idt_files. The
          # final installer appears in install\en-US only after packaging succeeds.
          $finalMsiDirectory = Join-Path $installation 'LibreOfficeDev\msi\install\en-US'
          if (-not (Test-Path -LiteralPath $finalMsiDirectory -PathType Container)) {
            throw "Expected final MSI directory $finalMsiDirectory was not produced."
          }
          $msis = @(Get-ChildItem -LiteralPath $finalMsiDirectory -Filter '*.msi' -File -ErrorAction Stop)
          if ($msis.Count -ne 1) {
            $candidates = if ($msis.Count -gt 0) {
              ($msis | ForEach-Object FullName) -join '; '
            } else {
              '(none)'
            }
            throw "Expected exactly one final MSI under $finalMsiDirectory, found $($msis.Count): $candidates"
          }

          $dist = Join-Path $env:GITHUB_WORKSPACE 'dist-windows'
          $checkRoot = Join-Path $env:LO_BUILD_ROOT 'msi-check'
          New-Item -ItemType Directory -Force -Path $dist, $checkRoot | Out-Null
          $manifest = @()
          for ($index = 0; $index -lt $msis.Count; $index++) {
            $msi = $msis[$index]
            $extract = Join-Path $checkRoot $index
            $log = Join-Path $dist "$($msi.BaseName)-admin-extract.log"
            New-Item -ItemType Directory -Force -Path $extract | Out-Null
            $process = Start-Process -FilePath "$env:SystemRoot\System32\msiexec.exe" `
              -ArgumentList @('/a', $msi.FullName, '/qn', "TARGETDIR=$extract", '/L*V', $log) `
              -Wait -PassThru
            if ($process.ExitCode -notin @(0, 3010)) {
              throw "Administrative extraction failed for $($msi.Name) with exit code $($process.ExitCode)."
            }
            $soffice = Get-ChildItem -LiteralPath $extract -Recurse -Filter soffice.exe -File -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $soffice) {
              throw "The MSI $($msi.Name) does not contain a soffice.exe payload."
            }

            $canonicalName = 'LibreOfficeMaterial-Windows-x64.msi'
            $destination = Join-Path $dist $canonicalName
            Copy-Item -LiteralPath $msi.FullName -Destination $destination
            $hash = (Get-FileHash -LiteralPath $destination -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $canonicalName" | Set-Content -LiteralPath "$destination.sha256" -Encoding ascii
            $manifest += [ordered]@{
              file = $canonicalName
              bytes = $msi.Length
              sha256 = $hash
              source_commit = '${{ github.sha }}'
              administrative_extract = 'passed'
              payload = $soffice.FullName.Substring($extract.Length).TrimStart('\')
              runtime_verified = $false
              signed = $false
            }
          }
          $manifest | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath (Join-Path $dist 'windows-msi-manifest.json') -Encoding utf8
          Get-ChildItem -LiteralPath $dist | Format-Table Name, Length
          "found=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload validated Windows MSI artifact
        if: steps.stage.outputs.found == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: libreoffice-material-windows-x64-${{ github.sha }}
          path: dist-windows/
          if-no-files-found: error
          retention-days: 30

      - name: Reject stable publication outside main
        if: steps.stage.outputs.found == 'true' && github.ref != 'refs/heads/main'
        shell: pwsh
        run: throw 'Stable Windows releases may be published only from refs/heads/main.'

      - name: Publish Windows MSI release
        if: steps.stage.outputs.found == 'true' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $short = '${{ github.sha }}'.Substring(0, 10)
          $tag = "windows-msi-${{ github.run_number }}-${{ github.run_attempt }}-$short"
          $repository = '${{ github.repository }}'
          $releaseUrl = "https://github.com/$repository/releases/tag/$tag"
          $installerName = 'LibreOfficeMaterial-Windows-x64.msi'
          $releaseManifest = @(Get-Content -LiteralPath 'dist-windows\windows-msi-manifest.json' -Raw | ConvertFrom-Json)
          if ($releaseManifest.Count -ne 1 -or $releaseManifest[0].file -ne $installerName) {
            throw 'The staged release manifest does not describe exactly one canonical MSI.'
          }
          $installerHash = [string]$releaseManifest[0].sha256
          $installerBytes = [long]$releaseManifest[0].bytes
          if ($installerHash -notmatch '^[0-9a-f]{64}$' -or $installerBytes -le 0) {
            throw 'The staged MSI release metadata is invalid.'
          }
          $installerUrl = "https://github.com/$repository/releases/download/$tag/$installerName"
          $updateFeed = @"
          <?xml version="1.0" encoding="utf-8"?>
          <inst:description xmlns:inst="http://update.libreoffice.org/description">
            <inst:id>LibreOffice Material Windows x64</inst:id>
            <inst:version>Windows x64 $short</inst:version>
            <inst:buildid>${{ github.sha }}</inst:buildid>
            <inst:gitid>${{ github.sha }}</inst:gitid>
            <inst:os>Windows</inst:os>
            <inst:arch>X86_64</inst:arch>
            <inst:update type="application/x-msi" src="$installerUrl" sha256="$installerHash" size="$installerBytes" release-tag="$tag" file-name="$installerName" />
            <inst:relnote pos="1" src="$releaseUrl" />
          </inst:description>
          "@
          $updateNamespace = 'http://update.libreoffice.org/description'
          [xml]$updateFeedDocument = $updateFeed
          if ($updateFeedDocument.DocumentElement.LocalName -ne 'description' `
              -or $updateFeedDocument.DocumentElement.NamespaceURI -ne $updateNamespace) {
            throw 'The generated update manifest has an invalid root element or namespace.'
          }
          function Get-RequiredFeedElement([string]$localName) {
            $nodes = @($updateFeedDocument.GetElementsByTagName($localName, $updateNamespace))
            if ($nodes.Count -ne 1) {
              throw "The generated update manifest requires exactly one $localName element."
            }
            return $nodes[0]
          }
          $expectedFeedText = [ordered]@{
            id = 'LibreOffice Material Windows x64'
            version = "Windows x64 $short"
            buildid = '${{ github.sha }}'
            gitid = '${{ github.sha }}'
            os = 'Windows'
            arch = 'X86_64'
          }
          foreach ($entry in $expectedFeedText.GetEnumerator()) {
            if ((Get-RequiredFeedElement $entry.Key).InnerText -ne $entry.Value) {
              throw "The generated update manifest has an invalid $($entry.Key) value."
            }
          }
          $updateElement = Get-RequiredFeedElement 'update'
          $expectedUpdateAttributes = [ordered]@{
            type = 'application/x-msi'
            src = $installerUrl
            sha256 = $installerHash
            size = [string]$installerBytes
            'release-tag' = $tag
            'file-name' = $installerName
          }
          foreach ($entry in $expectedUpdateAttributes.GetEnumerator()) {
            if ($updateElement.GetAttribute($entry.Key) -ne $entry.Value) {
              throw "The generated update manifest has an invalid $($entry.Key) attribute."
            }
          }
          $releaseNoteElement = Get-RequiredFeedElement 'relnote'
          if ($releaseNoteElement.GetAttribute('pos') -ne '1' `
              -or $releaseNoteElement.GetAttribute('src') -ne $releaseUrl) {
            throw 'The generated update manifest has invalid release-note metadata.'
          }
          $updateFeedPath = Join-Path 'dist-windows' 'windows-update-manifest.xml'
          $updateFeed | Set-Content -LiteralPath $updateFeedPath -Encoding utf8
          [xml]$persistedUpdateFeed = (Get-Content -LiteralPath $updateFeedPath -Raw)
          if ($persistedUpdateFeed.OuterXml -ne $updateFeedDocument.OuterXml) {
            throw 'The persisted update manifest differs from the validated XML.'
          }
          $notes = @"
          Unofficial, unsigned LibreOfficeDev Windows x64 build from commit ${{ github.sha }}.

          The MSI passed the required native C++ regression targets, including updater protocol parsing, trusted-source validation, and file-integrity regression tests. It also passed an administrative extraction check and contains soffice.exe. The built-in updater follows only this repository's normal Latest release, checks the canonical MSI byte count and SHA-256 after download and again before launch, and requires explicit default-No consent before starting the interactive Windows Installer. The package is currently unsigned; these checks detect corruption but do not replace publisher code signing. Its low-level off-screen desktop interaction and screenshot result will be linked here after the release asset is exercised on Windows. Do not install it over an official LibreOffice release.

          Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "@
          $releaseTitle = "LibreOffice Material Windows x64 — $short"
          $installerPath = Join-Path 'dist-windows' $installerName
          $assets = @(
            (Resolve-Path -LiteralPath $installerPath).Path
            (Resolve-Path -LiteralPath "$installerPath.sha256").Path
            (Resolve-Path -LiteralPath 'dist-windows\windows-msi-manifest.json').Path
            (Resolve-Path -LiteralPath $updateFeedPath).Path
          )
          if ($assets.Count -ne 4) {
            throw 'The release asset set is incomplete.'
          }
          $expectedAssetMetadata = @{}
          foreach ($assetPath in $assets) {
            $assetFile = Get-Item -LiteralPath $assetPath
            if ($expectedAssetMetadata.ContainsKey($assetFile.Name)) {
              throw "The staged release contains a duplicate asset name: $($assetFile.Name)"
            }
            $expectedAssetMetadata[$assetFile.Name] = [pscustomobject]@{
              size = [long]$assetFile.Length
              digest = "sha256:$((Get-FileHash -LiteralPath $assetFile.FullName -Algorithm SHA256).Hash.ToLowerInvariant())"
            }
          }
          function Test-ExactReleaseAssets($releaseObject) {
            $remoteAssets = @($releaseObject.assets)
            if ($remoteAssets.Count -ne $expectedAssetMetadata.Count) {
              return $false
            }
            $expectedNames = @($expectedAssetMetadata.Keys | Sort-Object)
            $remoteNames = @($remoteAssets | ForEach-Object { [string]$_.name } | Sort-Object)
            if (@(Compare-Object $expectedNames $remoteNames).Count -ne 0) {
              return $false
            }
            foreach ($remoteAsset in $remoteAssets) {
              $name = [string]$remoteAsset.name
              if (-not $expectedAssetMetadata.ContainsKey($name)) {
                return $false
              }
              $expected = $expectedAssetMetadata[$name]
              if ([string]$remoteAsset.state -ne 'uploaded' `
                  -or [long]$remoteAsset.size -ne $expected.size `
                  -or [string]$remoteAsset.digest -ne $expected.digest) {
                return $false
              }
            }
            return $true
          }
          function Get-ReleaseForExactTag {
            $releaseJson = gh release view $tag --repo $repository --json tagName,name,isDraft,isPrerelease,publishedAt,targetCommitish,url,assets 2>$null
            if ($LASTEXITCODE -ne 0) {
              return $null
            }
            return (($releaseJson -join [Environment]::NewLine) | ConvertFrom-Json)
          }
          function Get-ExactTagReference {
            $tagRefsJson = gh api -H 'Cache-Control: no-cache' "repos/$repository/git/matching-refs/tags/$tag"
            if ($LASTEXITCODE -ne 0) {
              throw "Querying the exact release tag reference failed with exit code $LASTEXITCODE."
            }
            $tagRefs = @(($tagRefsJson -join [Environment]::NewLine) | ConvertFrom-Json)
            $exactTagRefs = @($tagRefs | Where-Object { [string]$_.ref -eq "refs/tags/$tag" })
            if ($exactTagRefs.Count -gt 1) {
              throw "GitHub returned more than one exact reference for tag $tag."
            }
            if ($exactTagRefs.Count -eq 0) {
              return $null
            }
            return $exactTagRefs[0]
          }
          function Resolve-ExactTagCommit {
            $tagRef = Get-ExactTagReference
            if (-not $tagRef) {
              return $null
            }
            $objectType = [string]$tagRef.object.type
            $objectSha = [string]$tagRef.object.sha
            for ($depth = 0; $depth -lt 8; $depth++) {
              if ($objectType -eq 'commit') {
                return $objectSha.ToLowerInvariant()
              }
              if ($objectType -ne 'tag' -or $objectSha -notmatch '^[0-9a-fA-F]{40}$') {
                throw "Tag $tag resolves through unsupported object type '$objectType'."
              }
              $tagObjectJson = gh api -H 'Cache-Control: no-cache' "repos/$repository/git/tags/$objectSha"
              if ($LASTEXITCODE -ne 0) {
                throw "Peeling annotated tag object $objectSha failed with exit code $LASTEXITCODE."
              }
              $tagObject = ($tagObjectJson -join [Environment]::NewLine) | ConvertFrom-Json
              $objectType = [string]$tagObject.object.type
              $objectSha = [string]$tagObject.object.sha
            }
            throw "Tag $tag exceeded the bounded annotated-tag peel depth."
          }

          $createdMarker = Join-Path $env:RUNNER_TEMP "windows-msi-release-created-${{ github.run_id }}-${{ github.run_attempt }}.json"
          $promotionMarker = Join-Path $env:RUNNER_TEMP "windows-msi-release-promotion-${{ github.run_id }}-${{ github.run_attempt }}.txt"
          Remove-Item -LiteralPath $createdMarker, $promotionMarker -Force -ErrorAction SilentlyContinue
          $release = Get-ReleaseForExactTag
          if ($release) {
            if ($release.tagName -ne $tag `
                -or $release.name -ne $releaseTitle `
                -or $release.targetCommitish -ne '${{ github.sha }}' `
                -or $release.url -ne $releaseUrl `
                -or $release.isPrerelease `
                -or ($release.isDraft -and $release.publishedAt) `
                -or (-not $release.isDraft -and -not $release.publishedAt)) {
              throw "A release named $tag already exists but is not the exact normal release state owned by this run."
            }
            $resolvedExistingTag = Resolve-ExactTagCommit
            if ($resolvedExistingTag -ne '${{ github.sha }}') {
              throw "Existing release tag $tag does not peel to this workflow commit."
            }
            $existingState = if ($release.isDraft) { 'draft' } else { 'published' }
            Write-Host "Recovering the exact existing $existingState release $tag; no duplicate will be created."
          }
          else {
            $preexistingTag = Get-ExactTagReference
            if ($preexistingTag) {
              throw "Refusing to create release $tag because its exact tag already exists without a recoverable exact release."
            }

            # GitHub does not materialize a new draft release's tag until
            # publication. Create an exact lightweight tag first so the draft
            # and every uploaded asset are cryptographically bound to this SHA
            # before the release can be promoted.
            $createdTagJson = gh api --method POST "repos/$repository/git/refs" `
              -f ref="refs/tags/$tag" `
              -f sha='${{ github.sha }}'
            if ($LASTEXITCODE -ne 0) {
              throw "Creating exact release tag $tag failed with exit code $LASTEXITCODE."
            }
            $createdTag = ($createdTagJson -join [Environment]::NewLine) | ConvertFrom-Json
            if ($createdTag.ref -ne "refs/tags/$tag" `
                -or [string]$createdTag.object.type -ne 'commit' `
                -or [string]$createdTag.object.sha -ne '${{ github.sha }}' `
                -or (Resolve-ExactTagCommit) -ne '${{ github.sha }}') {
              throw "GitHub did not create exact tag $tag at this workflow commit."
            }
            [ordered]@{
              tag = $tag
              source_commit = '${{ github.sha }}'
            } | ConvertTo-Json | Set-Content -LiteralPath $createdMarker -Encoding utf8

            gh release create $tag @assets `
              --title $releaseTitle `
              --target '${{ github.sha }}' `
              --draft `
              --prerelease=false `
              --latest=false `
              --notes $notes
            $createExitCode = $LASTEXITCODE
            if ($createExitCode -ne 0) {
              Write-Warning "Draft creation returned exit code $createExitCode; checking whether GitHub nevertheless created the exact release."
            }
          }

          $releaseReady = $null
          for ($attempt = 1; $attempt -le 36; $attempt++) {
            $candidate = Get-ReleaseForExactTag
            if ($candidate) {
              $candidateIsNormalState = -not $candidate.isPrerelease `
                -and (($candidate.isDraft -and -not $candidate.publishedAt) `
                  -or (-not $candidate.isDraft -and $candidate.publishedAt))
              $candidateTagCommit = Resolve-ExactTagCommit
              if ($candidate.tagName -eq $tag `
                  -and $candidate.name -eq $releaseTitle `
                  -and $candidate.targetCommitish -eq '${{ github.sha }}' `
                  -and $candidate.url -eq $releaseUrl `
                  -and $candidateIsNormalState `
                  -and $candidateTagCommit -eq '${{ github.sha }}' `
                  -and (Test-ExactReleaseAssets $candidate)) {
                $releaseReady = $candidate
                break
              }
            }
            Write-Host "Waiting for exact release metadata, tag target, and assets ($attempt/36)."
            if ($attempt -lt 36) {
              Start-Sleep -Seconds 10
            }
          }
          if (-not $releaseReady) {
            throw 'The exact release did not reach the expected target, tag, and four-asset state.'
          }

          # Re-resolve immediately before promotion so a moved or retargeted tag
          # can never publish assets for a commit other than this workflow SHA.
          $promotionTagCommit = Resolve-ExactTagCommit
          if ($promotionTagCommit -ne '${{ github.sha }}') {
            throw "Release tag $tag no longer peels to this workflow commit; refusing promotion."
          }
          $tag | Set-Content -LiteralPath $promotionMarker -Encoding ascii
          gh release edit $tag --draft=false --prerelease=false --latest --repo $repository
          if ($LASTEXITCODE -ne 0) {
            throw "Publishing or recovering verified release $tag failed with exit code $LASTEXITCODE."
          }

          $publishedRelease = $null
          for ($attempt = 1; $attempt -le 36; $attempt++) {
            $candidate = Get-ReleaseForExactTag
            $candidateTagCommit = if ($candidate) { Resolve-ExactTagCommit } else { $null }
            if ($candidate `
                -and $candidate.tagName -eq $tag -and -not $candidate.isDraft `
                -and $candidate.name -eq $releaseTitle `
                -and -not $candidate.isPrerelease -and $candidate.publishedAt `
                -and $candidate.targetCommitish -eq '${{ github.sha }}' `
                -and $candidate.url -eq $releaseUrl `
                -and $candidateTagCommit -eq '${{ github.sha }}' `
                -and (Test-ExactReleaseAssets $candidate)) {
              $publishedRelease = $candidate
              break
            }
            Write-Host "Waiting for normal published release metadata ($attempt/36)."
            if ($attempt -lt 36) {
              Start-Sleep -Seconds 10
            }
          }
          if (-not $publishedRelease) {
            throw 'The verified release did not become a normal published release with the exact tag and assets.'
          }

          $latestAssetsVerified = $false
          for ($attempt = 1; $attempt -le 36; $attempt++) {
            $latestJson = gh api -H 'Cache-Control: no-cache' "repos/$repository/releases/latest"
            if ($LASTEXITCODE -eq 0) {
              $latest = ($latestJson -join [Environment]::NewLine) | ConvertFrom-Json
              if ($latest.tag_name -eq $tag -and -not $latest.draft -and -not $latest.prerelease `
                  -and $latest.name -eq $releaseTitle `
                  -and $latest.target_commitish -eq '${{ github.sha }}' `
                  -and (Test-ExactReleaseAssets $latest)) {
                $allPublicAssetsMatch = $true
                $publicVerificationOrder = @(
                  'windows-update-manifest.xml'
                  'windows-msi-manifest.json'
                  "$installerName.sha256"
                  $installerName
                )
                foreach ($assetName in $publicVerificationOrder) {
                  $cacheBuster = "${{ github.run_id }}-${{ github.run_attempt }}-$attempt-$([DateTimeOffset]::UtcNow.ToUnixTimeMilliseconds())"
                  $encodedAssetName = [uri]::EscapeDataString($assetName)
                  $publicAssetUrl = "https://github.com/$repository/releases/latest/download/${encodedAssetName}?cachebust=$cacheBuster"
                  $publicAssetPath = Join-Path $env:RUNNER_TEMP "latest-$attempt-$assetName"
                  Remove-Item -LiteralPath $publicAssetPath -Force -ErrorAction SilentlyContinue
                  curl.exe -fsSL --retry 3 --retry-all-errors --retry-delay 3 `
                    --connect-timeout 30 --max-time 900 `
                    -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' `
                    $publicAssetUrl -o $publicAssetPath
                  if ($LASTEXITCODE -ne 0 -or -not (Test-Path -LiteralPath $publicAssetPath -PathType Leaf)) {
                    $allPublicAssetsMatch = $false
                    Remove-Item -LiteralPath $publicAssetPath -Force -ErrorAction SilentlyContinue
                    Write-Warning "Public Latest download failed for $assetName on polling attempt $attempt."
                    break
                  }
                  $expectedPublicAsset = $expectedAssetMetadata[$assetName]
                  $publicAsset = Get-Item -LiteralPath $publicAssetPath
                  $publicAssetDigest = "sha256:$((Get-FileHash -LiteralPath $publicAssetPath -Algorithm SHA256).Hash.ToLowerInvariant())"
                  if ([long]$publicAsset.Length -ne $expectedPublicAsset.size `
                      -or $publicAssetDigest -ne $expectedPublicAsset.digest) {
                    $allPublicAssetsMatch = $false
                    Remove-Item -LiteralPath $publicAssetPath -Force -ErrorAction SilentlyContinue
                    Write-Warning "Public Latest bytes did not match staged asset $assetName on polling attempt $attempt."
                    break
                  }
                  Remove-Item -LiteralPath $publicAssetPath -Force
                }
                if ($allPublicAssetsMatch) {
                  $latestAssetsVerified = $true
                  break
                }
              }
            }
            Write-Host "Waiting for public Latest routing and all four cache-busted assets ($attempt/36)."
            if ($attempt -lt 36) {
              Start-Sleep -Seconds 10
            }
          }
          if (-not $latestAssetsVerified) {
            throw 'The public Latest route did not resolve all four assets to the validated release bytes.'
          }

      - name: Clean up failed draft release
        if: failure() && steps.stage.outputs.found == 'true' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $short = '${{ github.sha }}'.Substring(0, 10)
          $tag = "windows-msi-${{ github.run_number }}-${{ github.run_attempt }}-$short"
          $repository = '${{ github.repository }}'
          $createdMarker = Join-Path $env:RUNNER_TEMP "windows-msi-release-created-${{ github.run_id }}-${{ github.run_attempt }}.json"
          $promotionMarker = Join-Path $env:RUNNER_TEMP "windows-msi-release-promotion-${{ github.run_id }}-${{ github.run_attempt }}.txt"
          if (-not (Test-Path -LiteralPath $createdMarker -PathType Leaf)) {
            Write-Host "This job did not record creating release $tag; preserving any existing release and tag."
            exit 0
          }
          $creationRecord = Get-Content -LiteralPath $createdMarker -Raw | ConvertFrom-Json
          if ($creationRecord.tag -ne $tag -or $creationRecord.source_commit -ne '${{ github.sha }}') {
            Write-Warning 'The release-creation marker does not match this run; refusing cleanup.'
            exit 0
          }
          if (Test-Path -LiteralPath $promotionMarker -PathType Leaf) {
            Write-Host "Promotion of $tag was attempted; preserving the release and tag regardless of later verification failures."
            exit 0
          }
          $tagRefsJson = gh api -H 'Cache-Control: no-cache' "repos/$repository/git/matching-refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            Write-Warning 'Could not verify the failed release tag target; refusing cleanup.'
            exit 0
          }
          $tagRefs = @(($tagRefsJson -join [Environment]::NewLine) | ConvertFrom-Json)
          $exactTagRefs = @($tagRefs | Where-Object { [string]$_.ref -eq "refs/tags/$tag" })
          if ($exactTagRefs.Count -ne 1 `
              -or [string]$exactTagRefs[0].object.type -ne 'commit' `
              -or [string]$exactTagRefs[0].object.sha -ne '${{ github.sha }}') {
            Write-Warning 'The failed release tag is absent, moved, or annotated unexpectedly; refusing cleanup.'
            exit 0
          }
          $releaseJson = gh release view $tag --repo $repository --json tagName,isDraft,targetCommitish
          if ($LASTEXITCODE -ne 0) {
            $tagFilter = '.[] | select(.tag_name == "{0}") | .id' -f $tag
            $matchingReleaseIds = @(gh api --paginate "repos/$repository/releases?per_page=100" --jq $tagFilter)
            if ($LASTEXITCODE -ne 0) {
              Write-Warning 'Could not exhaustively verify release absence; preserving the exact owned tag.'
              exit 0
            }
            if ($matchingReleaseIds.Count -ne 0) {
              Write-Warning 'An exact-tag release exists but could not be safely classified; preserving it and the tag.'
              exit 0
            }
            gh api --method DELETE "repos/$repository/git/refs/tags/$tag"
            if ($LASTEXITCODE -ne 0) {
              throw "Deleting exact orphan tag $tag failed with exit code $LASTEXITCODE."
            }
            Write-Host "Deleted exact owned orphan tag $tag after draft creation failed."
            exit 0
          }
          $failedRelease = ($releaseJson -join [Environment]::NewLine) | ConvertFrom-Json
          if ($failedRelease.tagName -ne $tag `
              -or $failedRelease.targetCommitish -ne '${{ github.sha }}') {
            Write-Warning "Refusing to clean up release metadata that does not match this run."
            exit 0
          }
          if (-not $failedRelease.isDraft) {
            Write-Host "Release $tag is published; preserving it."
            exit 0
          }
          gh release delete $tag --repo $repository --cleanup-tag --yes
          if ($LASTEXITCODE -ne 0) {
            throw "Deleting failed draft release $tag failed with exit code $LASTEXITCODE."
          }
          Write-Host "Deleted failed draft release and tag $tag."

      - name: Stage Windows build diagnostics
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $destinationRoot = Join-Path $env:GITHUB_WORKSPACE 'windows-build-diagnostics'
          New-Item -ItemType Directory -Force -Path $destinationRoot | Out-Null

          $files = [System.Collections.Generic.List[System.IO.FileInfo]]::new()
          foreach ($name in @('config.log', 'autogen.input', 'autogen.lastrun', 'config_host.mk')) {
            $path = Join-Path $env:LO_BUILD_DIR $name
            if (Test-Path -LiteralPath $path -PathType Leaf) {
              $files.Add((Get-Item -LiteralPath $path))
            }
          }

          foreach ($relativeDirectory in @(
            'workdir\CppunitTest',
            'workdir\CustomTarget\instsetoo_native\install',
            'workdir\installation'
          )) {
            $directory = Join-Path $env:LO_BUILD_DIR $relativeDirectory
            if (Test-Path -LiteralPath $directory -PathType Container) {
              Get-ChildItem -LiteralPath $directory -Recurse -File -ErrorAction SilentlyContinue |
                Where-Object { $_.Extension -in @('.log', '.core') } |
                ForEach-Object { $files.Add($_) }
            }
          }

          foreach ($file in $files) {
            $relative = [System.IO.Path]::GetRelativePath($env:LO_BUILD_DIR, $file.FullName)
            $destination = Join-Path (Join-Path $destinationRoot 'build') $relative
            New-Item -ItemType Directory -Force -Path (Split-Path -Parent $destination) | Out-Null
            Copy-Item -LiteralPath $file.FullName -Destination $destination -Force
          }

          $fetchLog = Join-Path $env:LO_TARBALL_DIR 'fetch.log'
          if (Test-Path -LiteralPath $fetchLog -PathType Leaf) {
            $tarballLogs = Join-Path $destinationRoot 'tarballs'
            New-Item -ItemType Directory -Force -Path $tarballLogs | Out-Null
            Copy-Item -LiteralPath $fetchLog -Destination $tarballLogs -Force
          }

          $distribution = Join-Path $env:GITHUB_WORKSPACE 'dist-windows'
          if (Test-Path -LiteralPath $distribution -PathType Container) {
            $distributionLogs = Join-Path $destinationRoot 'distribution'
            New-Item -ItemType Directory -Force -Path $distributionLogs | Out-Null
            Get-ChildItem -LiteralPath $distribution -File -Filter '*.log' |
              Copy-Item -Destination $distributionLogs -Force
          }

          Get-ChildItem -LiteralPath $destinationRoot -Recurse -File |
            Select-Object FullName, Length | Format-Table -AutoSize

      - name: Preserve Windows build diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-build-diagnostics-${{ github.run_id }}
          path: windows-build-diagnostics/
          if-no-files-found: ignore
          retention-days: 14
