name: Windows UI contract

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dialog-notification-coverage:
    name: Exhaustive dialog notification coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate native dialog policy registry
        run: python3 bin/check-windows-dialog-notification-contract.py

      - name: Run registry regressions
        run: python3 bin/test_windows_dialog_notification_contract.py

      - name: Validate final-layout Windows dialog placement
        run: python3 bin/check-windows-dialog-placement.py

      - name: Run dialog-placement mutation regressions
        run: python3 bin/test_windows_dialog_placement.py

      - name: Validate native search-field coverage
        run: python3 bin/check_search_field_coverage.py

      - name: Run search-field coverage regressions
        run: python3 bin/test_search_field_coverage.py

      - name: Validate shared anchored regex-builder foundation
        run: python3 bin/check-windows-regex-builder-foundation.py

      - name: Run regex-builder foundation mutations
        run: python3 bin/test_windows_regex_builder_foundation.py

      - name: Validate native regex-search integrations
        run: python3 bin/check-windows-regex-search-integrations.py

      - name: Run regex-search integration mutations
        run: python3 bin/test_windows_regex_search_integrations.py

      - name: Validate Windows no-nag startup contract
        run: python3 bin/check-windows-no-nag-contract.py

      - name: Run Windows no-nag mutation regressions
        run: python3 bin/test_windows_no_nag_contract.py

      - name: Validate fresh and legacy no-nag headless harness
        run: python3 bin/check-windows-nonag-headless-harness.py

      - name: Run no-nag headless harness mutation regressions
        run: python3 bin/test_windows_nonag_headless_harness.py

      - name: Validate local Git notification-store foundation
        run: python3 bin/check-notification-store-contract.py

      - name: Run notification-store mutation regressions
        run: python3 bin/test_notification_store_contract.py

      # --- wave-1 backfill: Material contract pairs not yet run by any workflow ---

      - name: Validate Material dialog anatomy policy
        run: python3 bin/check-material-dialog-anatomy.py

      - name: Run Material dialog anatomy mutation regressions
        run: python3 bin/test_material_dialog_anatomy.py

      - name: Validate Material token accessor contract
        run: python3 bin/check-material-token-accessor.py

      - name: Run Material token accessor mutation regressions
        run: python3 bin/test_material_token_accessor.py

      - name: Validate Impress/Draw editing-surface contract
        run: python3 bin/check-impress-draw-surface-contract.py

      - name: Run Impress/Draw surface mutation regressions
        run: python3 bin/test_impress_draw_surface_contract.py

      - name: Validate Windows UI registered-inventory closure
        run: python3 bin/check-windows-ui-registry-closure.py

      - name: Run Windows UI registry closure mutation regressions
        run: python3 bin/test_windows_ui_registry_closure.py

      # --- Batch A backfill: Material contract pairs not yet run by any workflow ---

      - name: Validate Windows menu composition
        run: python3 bin/check-windows-menu-composition.py

      - name: Run Windows menu composition mutation regressions
        run: python3 bin/test_windows_menu_composition.py

      - name: Validate Material infobar severity contract
        run: python3 bin/check-material-infobar-contract.py

      - name: Run Material infobar mutation regressions
        run: python3 bin/test_material_infobar_contract.py

      - name: Validate Windows link contract
        run: python3 bin/check-windows-link-contract.py

      - name: Run Windows link contract mutation regressions
        run: python3 bin/test_windows_link_contract.py

      - name: Validate Windows sidebar rail
        run: python3 bin/check-windows-sidebar-rail.py

      - name: Run Windows sidebar rail mutation regressions
        run: python3 bin/test_windows_sidebar_rail.py

      - name: Validate Windows status bar composition
        run: python3 bin/check-windows-statusbar-composition.py

      - name: Run Windows status bar composition mutation regressions
        run: python3 bin/test_windows_statusbar_composition.py

      - name: Validate Windows Start Center cards
        run: python3 bin/check-windows-startcenter-cards.py

      - name: Run Windows Start Center cards mutation regressions
        run: python3 bin/test_windows_startcenter_cards.py

      - name: Validate Windows Find & Replace fieldset
        run: python3 bin/check-windows-find-replace-fieldset.py

      - name: Run Windows Find & Replace fieldset mutation regressions
        run: python3 bin/test_windows_find_replace_fieldset.py

      - name: Validate Windows Calc sheet tabs
        run: python3 bin/check-windows-calc-sheet-tabs.py

      - name: Run Windows Calc sheet tabs mutation regressions
        run: python3 bin/test_windows_calc_sheet_tabs.py

      # --- Batch B: new and modified Material contract pairs ---

      - name: Validate Calc chrome contract
        run: python3 bin/check-calc-chrome-contract.py

      - name: Run Calc chrome mutation regressions
        run: python3 bin/test_calc_chrome_contract.py

      - name: Validate Calc formula bar contract
        run: python3 bin/check-calc-formula-bar-contract.py

      - name: Run Calc formula bar mutation regressions
        run: python3 bin/test_calc_formula_bar_contract.py

      - name: Validate notification producer contract
        run: python3 bin/check-notification-producer-contract.py

      - name: Run notification producer mutation regressions
        run: python3 bin/test_notification_producer_contract.py

      - name: Validate Windows sidebar panels
        run: python3 bin/check-windows-sidebar-panels.py

      - name: Run Windows sidebar panels mutation regressions
        run: python3 bin/test_windows_sidebar_panels.py

      - name: Validate component gallery coverage
        run: python3 bin/check-component-gallery-coverage.py

      - name: Run component gallery coverage mutation regressions
        run: python3 bin/test_component_gallery_coverage.py

      # --- Batch C: system-dialog, catalog, and modality contract pairs ---

      - name: Validate Windows file-flow delegation contract
        run: python3 bin/check-windows-file-flow-contract.py

      - name: Run Windows file-flow mutation regressions
        run: python3 bin/test_windows_file_flow_contract.py

      - name: Validate PDF export dialog contract
        run: python3 bin/check-pdf-export-dialog-contract.py

      - name: Run PDF export dialog mutation regressions
        run: python3 bin/test_pdf_export_dialog_contract.py

      - name: Validate Document Properties dialog contract
        run: python3 bin/check-windows-document-properties-contract.py

      - name: Run Document Properties mutation regressions
        run: python3 bin/test_windows_document_properties_contract.py

      - name: Validate template manager contract
        run: python3 bin/check-template-manager-contract.py

      - name: Run template manager mutation regressions
        run: python3 bin/test_template_manager_contract.py

      - name: Validate extension manager contract
        run: python3 bin/check-extension-manager-contract.py

      - name: Run extension manager mutation regressions
        run: python3 bin/test_extension_manager_contract.py

      - name: Validate Windows macro surface contract
        run: python3 bin/check-windows-macro-surface.py

      - name: Run Windows macro surface mutation regressions
        run: python3 bin/test_windows_macro_surface.py

      - name: Validate Windows security-prompt modality contract
        run: python3 bin/check-windows-security-prompt-modality.py

      - name: Run security-prompt modality mutation regressions
        run: python3 bin/test_windows_security_prompt_modality.py

      - name: Validate Windows recovery and Safe Mode contract
        run: python3 bin/check-windows-recovery-safemode-contract.py

      - name: Run recovery and Safe Mode mutation regressions
        run: python3 bin/test_windows_recovery_safemode_contract.py

      - name: Validate Material migration compatibility contract
        run: python3 bin/check-material-migration-compat-contract.py

      - name: Run migration compatibility mutation regressions
        run: python3 bin/test_material_migration_compat_contract.py

      - name: Validate uui interaction modality contract
        run: python3 bin/check-uui-interaction-contract.py

      - name: Run uui interaction mutation regressions
        run: python3 bin/test_uui_interaction_contract.py

      - name: Validate Help/About family contract
        run: python3 bin/check-help-about-family.py

      - name: Run Help/About family mutation regressions
        run: python3 bin/test_help_about_family.py

      - name: Validate Features command catalog coverage
        run: python3 bin/check-features-command-catalog.py

      - name: Run Features command catalog mutation regressions
        run: python3 bin/test_features_command_catalog.py
