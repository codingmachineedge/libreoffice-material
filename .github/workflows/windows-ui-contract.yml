      - name: Validate version-history seeded-state ledger
        run: python3 bin/check-version-history-seeded-state.py

      - name: Run version-history seeded-state mutation regressions
        run: python3 bin/test_version_history_seeded_state.py

      - name: Validate adaptive-layout ledger
        run: python3 bin/check-windows-adaptive-layout-ledger.py

