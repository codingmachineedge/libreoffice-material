      - name: Validate Calc chrome contract
        run: python3 bin/check-calc-chrome-contract.py

      - name: Run Calc chrome mutation regressions
        run: python3 bin/test_calc_chrome_contract.py

      - name: Validate Calc formula bar contract
        run: python3 bin/check-calc-formula-bar-contract.py

      - name: Run Calc formula bar mutation regressions
