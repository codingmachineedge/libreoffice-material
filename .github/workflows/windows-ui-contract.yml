name: Windows UI contract

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dialog-notification-coverage:
    name: Exhaustive dialog notification coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate native dialog policy registry
        run: python3 bin/check-windows-dialog-notification-contract.py

      - name: Run registry regressions
        run: python3 bin/test_windows_dialog_notification_contract.py

      - name: Validate final-layout Windows dialog placement
        run: python3 bin/check-windows-dialog-placement.py

      - name: Run dialog-placement mutation regressions
        run: python3 bin/test_windows_dialog_placement.py

      - name: Validate native search-field coverage
        run: python3 bin/check_search_field_coverage.py

      - name: Run search-field coverage regressions
        run: python3 bin/test_search_field_coverage.py

      - name: Validate shared anchored regex-builder foundation
        run: python3 bin/check-windows-regex-builder-foundation.py

      - name: Run regex-builder foundation mutations
        run: python3 bin/test_windows_regex_builder_foundation.py

      - name: Validate native regex-search integrations
        run: python3 bin/check-windows-regex-search-integrations.py

      - name: Run regex-search integration mutations
        run: python3 bin/test_windows_regex_search_integrations.py

      - name: Validate Windows no-nag startup contract
        run: python3 bin/check-windows-no-nag-contract.py

      - name: Run Windows no-nag mutation regressions
        run: python3 bin/test_windows_no_nag_contract.py

      - name: Validate local Git notification-store foundation
        run: python3 bin/check-notification-store-contract.py

      - name: Run notification-store mutation regressions
        run: python3 bin/test_notification_store_contract.py
